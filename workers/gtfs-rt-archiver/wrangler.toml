name = "atlas-gtfs-rt-archiver"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "atlas-live"

[triggers]
# Every minute: vehicle positions (headway/bunching needs sampling well under the
# ~5-min streetcar headway). Trip-delay archiving self-gates to every 5th minute.
crons = ["* * * * *", "0 4 * * *"]
