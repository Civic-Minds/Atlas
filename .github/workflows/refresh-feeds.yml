name: Refresh GTFS feeds

on:
  schedule:
    # Mondays 06:00 UTC (~01:00 Toronto)
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Refresh all agency feeds
        run: npm run refresh
        env:
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}

      - name: Commit updated index if changed
        run: |
          if ! git diff --quiet public/data/index.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/index.json
            git commit -m "chore: weekly GTFS feed refresh"
            git push
          else
            echo "No index changes."
          fi
